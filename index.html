<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Galardo | لینک‌های شخصی</title>
    <meta name="description" content="هاب شخصی Galardo برای دسترسی سریع به لینک‌های رفرال و سرویس‌های منتخب.">
    
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="Galardo | لینک‌های شخصی">
    <meta property="og:description" content="دسترسی سریع به لینک‌های رفرال و سرویس‌های منتخب.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="fa_IR">
    <!-- اگر عکس شاخص داری، آدرسش رو اینجا بذار تا در شبکه‌های اجتماعی نمایش داده بشه -->
    <!-- <meta property="og:image" content="Assets/og-image.jpg"> --> 
    
    <meta name="theme-color" content="#0b1220" id="theme-color-meta">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- دکمه تغییر تم -->
    <button id="theme-toggle" aria-label="تغییر تم">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <main class="app">
        <header class="header">
            <h1>Galardo</h1>
            <p>لینک‌های شخصی و رفرال</p>
        </header>

        <section class="search-wrap">
            <label class="sr-only" for="search">جستجو</label>
            <input id="search" type="search" placeholder="جستجو..." autocomplete="off">
        </section>

        <section id="tags" aria-label="دسته‌بندی‌ها"></section>
        <section id="grid" aria-label="لینک‌ها"></section>
    </main>

    <!-- پیام موفقیت (Toast) -->
    <div id="toast" class="toast" role="alert" aria-live="assertive">
        <span id="toast-message">لینک کپی شد!</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
